services:
  # =========================
  # RAG API Service
  # =========================
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LLM_PROVIDER=ollama
      - OLLAMA_MODEL=qwen2.5:3b
      - OLLAMA_BASE_URL=http://ollama:11434
      - USE_LOCAL_EMBEDDINGS=true
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma_db
      - COLLECTION_NAME=documents
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - MLFLOW_ENABLED=true
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=rag-document-qa
    volumes:
      - chroma_data:/app/data/chroma_db
      - model_cache:/root/.cache
    depends_on:
      ollama:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # =========================
  # Ollama LLM Service
  # =========================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  # =========================
  # Model Puller (one-time setup)
  # =========================
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - rag-network
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # =========================
  # MLflow Tracking Server
  # =========================
  mlflow:
    image: python:3.12-slim
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - rag-network
    restart: unless-stopped
    command: >
      bash -c "
        pip install mlflow>=2.18.0 --quiet &&
        mlflow server
          --host 0.0.0.0
          --port 5000
          --backend-store-uri sqlite:///mlflow/mlflow.db
          --default-artifact-root /mlflow/artifacts
      "
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5

volumes:
  chroma_data:
    driver: local
  ollama_data:
    driver: local
  model_cache:
    driver: local
  mlflow_data:
    driver: local

networks:
  rag-network:
    driver: bridge