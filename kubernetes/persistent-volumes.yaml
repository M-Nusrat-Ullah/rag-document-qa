# ChromaDB Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data-pvc
  namespace: rag-app
  labels:
    app: rag-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# Ollama Models Storage
apiVersion: v1
kind: PersistentVolumeClaim
